openapi: 3.0.0
info:
  title: "UNAHUR Anti-social Net API"
  description: "API de la red social Anti-social Net para la Universidad Nacional de Hurlingham (UNAHUR)."
  version: "1.1.0"
servers:
  - url: "http://localhost:4002"
    description: "Servidor local de desarrollo"

paths:
  # -------------------- USERS --------------------
  /users:
    get:
      summary: "Obtener todos los usuarios"
      description: "Retorna una lista con todos los usuarios registrados en el sistema."
      tags:
        - Users
      responses:
        '200':
          description: "Lista de usuarios devuelta exitosamente"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/create:
    post:
      summary: "Crear un nuevo usuario (Alias)"
      description: "Registra un nuevo usuario en la red social usando su nickName."
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: "Usuario creado exitosamente"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: "Error de validación (ej. nickName corto, nulo o ya registrado)"

  /users/{id}:
    get:
      summary: "Obtener un usuario por ID"
      description: "Retorna los detalles de un usuario específico, incluyendo sus posts, comentarios y seguidores."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario (MongoDB ObjectId)"
      responses:
        '200':
          description: "Usuario devuelto exitosamente"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: "Formato de ID inválido"
        '404':
          description: "Usuario no encontrado"

    put:
      summary: "Actualizar un usuario por ID"
      description: "Modifica el nickName de un usuario existente."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario a actualizar"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: "Usuario actualizado exitosamente"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: "Error de validación o ID inválido"
        '404':
          description: "Usuario no encontrado"

    delete:
      summary: "Eliminar un usuario por ID"
      description: "Elimina permanentemente a un usuario del sistema."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario a eliminar"
      responses:
        '200':
          description: "Usuario eliminado correctamente"
        '400':
          description: "Formato de ID inválido"
        '404':
          description: "Usuario no encontrado"

  /users/{id}/comments:
    get:
      summary: "Obtener comentarios de un usuario"
      description: "Retorna todos los comentarios realizados por el usuario especificado."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario"
      responses:
        '200':
          description: "Comentarios devueltos exitosamente"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '400':
          description: "ID inválido"
        '404':
          description: "Usuario no encontrado"

  /users/{id}/posts:
    get:
      summary: "Obtener posts de un usuario"
      description: "Retorna todos los posts publicados por el usuario especificado."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario"
      responses:
        '200':
          description: "Posts devueltos exitosamente"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '400':
          description: "ID inválido"
        '404':
          description: "Usuario no encontrado"

  /users/{id}/seguir/{idASeguir}:
    post:
      summary: "Seguir a un usuario"
      description: "Crea una relación de seguimiento donde el usuario {id} empieza a seguir al usuario {idASeguir}."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario seguidor"
        - in: path
          name: idASeguir
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario a seguir"
      responses:
        '200':
          description: "Operación realizada con éxito"
        '400':
          description: "IDs con formato inválido"
        '404':
          description: "Uno o ambos usuarios no existen"

  /users/{id}/follow/{idASeguir}:
    post:
      summary: "Seguir a un usuario (Alias en inglés)"
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
        - in: path
          name: idASeguir
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Operación realizada con éxito"
        '400':
          description: "IDs con formato inválido"
        '404':
          description: "Uno o ambos usuarios no existen"

  /users/{id}/unfollow/{idToUnfollow}:
    delete:
      summary: "Dejar de seguir a un usuario"
      description: "Remueve la relación de seguimiento entre el usuario {id} y el usuario {idToUnfollow}."
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario seguidor"
        - in: path
          name: idToUnfollow
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario a dejar de seguir"
      responses:
        '200':
          description: "Operación realizada con éxito"
        '400':
          description: "IDs con formato inválido"
        '404':
          description: "Uno o ambos usuarios no existen"

  /users/{id}/dejarSeguir/{idToUnfollow}:
    delete:
      summary: "Dejar de seguir a un usuario (Alias en español)"
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
        - in: path
          name: idToUnfollow
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Operación realizada con éxito"

  # -------------------- POSTS --------------------
  /posts:
    get:
      summary: "Obtener todos los posts"
      description: "Retorna todos los posts ordenados por fecha de creación descendente, incluyendo tags, imágenes y comentarios no vencidos."
      tags:
        - Posts
      responses:
        '200':
          description: "Lista de posts devuelta exitosamente"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: "Crear un nuevo post"
      description: "Crea una nueva publicación para un usuario."
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: "Post creado exitosamente"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: "Error de validación o ID de usuario inexistente"

  /posts/create:
    post:
      summary: "Crear un nuevo post (Alias)"
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: "Post creado exitosamente"

  /posts/create/{user_id}:
    post:
      summary: "Crear un nuevo post para un usuario específico por su ID"
      description: "Crea un post asignando el creador directamente desde el parámetro de la ruta."
      tags:
        - Posts
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del usuario que crea el post"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
              properties:
                description:
                  type: string
                  minLength: 1
                  maxLength: 500
                  example: "¡Hola red antisocial!"
                tags:
                  type: array
                  items:
                    type: string
                    pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '201':
          description: "Post creado exitosamente"
        '400':
          description: "Datos inválidos"
        '404':
          description: "Usuario no encontrado"

  /posts/{id}:
    get:
      summary: "Obtener un post por ID"
      description: "Retorna los detalles de un post específico."
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del Post"
      responses:
        '200':
          description: "Post obtenido exitosamente"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: "Post no encontrado"

    put:
      summary: "Actualizar un post por ID"
      description: "Modifica el contenido de un post existente."
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del Post"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: "Post actualizado exitosamente"
        '404':
          description: "Post no encontrado"

    delete:
      summary: "Eliminar un post por ID"
      description: "Elimina permanentemente un post."
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
          description: "ID del Post"
      responses:
        '200':
          description: "Post eliminado con éxito"
        '404':
          description: "Post no encontrado"

  /posts/{id}/comments:
    get:
      summary: "Obtener comentarios de un post"
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Lista de comentarios no vencidos devuelta exitosamente"

  /posts/{id}/tags:
    get:
      summary: "Obtener etiquetas de un post"
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Lista de tags devuelta exitosamente"

  /posts/{id}/user:
    get:
      summary: "Obtener el usuario creador del post"
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Usuario creador devuelto"

  /posts/{id}/image:
    post:
      summary: "Agregar imagen a un post"
      description: "Asocia una nueva URL de imagen al post especificado."
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: "https://ejemplo.com/imagen.jpg"
      responses:
        '201':
          description: "Imagen asociada correctamente"
        '404':
          description: "Post no encontrado"

  /posts/{id}/tag/{tagId}:
    post:
      summary: "Asociar etiqueta a un post por ruta"
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
        - in: path
          name: tagId
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Etiqueta agregada con éxito"

  /posts/{id}/create-tag:
    post:
      summary: "Asociar etiqueta a un post por cuerpo de petición"
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tagId
              properties:
                tagId:
                  type: string
                  pattern: '^[0-9a-fA-F]{24}$'
                  example: "60c72b2f9b1d8b3c6c8e4f1a"
      responses:
        '200':
          description: "Etiqueta agregada con éxito"

  # -------------------- COMMENTS --------------------
  /comments:
    get:
      summary: "Obtener todos los comentarios"
      tags:
        - Comments
      responses:
        '200':
          description: "Lista de comentarios obtenida exitosamente"
    post:
      summary: "Crear un nuevo comentario"
      tags:
        - Comments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: "Comentario creado exitosamente"

  /comments/create:
    post:
      summary: "Crear un nuevo comentario (Alias)"
      tags:
        - Comments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: "Comentario creado"

  /comments/{id}:
    get:
      summary: "Obtener un comentario por ID"
      tags:
        - Comments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Comentario devuelto"
        '404':
          description: "Comentario no encontrado"

    put:
      summary: "Actualizar un comentario por ID"
      tags:
        - Comments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  example: "Comentario actualizado"
      responses:
        '200':
          description: "Comentario actualizado"

    delete:
      summary: "Eliminar un comentario por ID"
      tags:
        - Comments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Comentario eliminado"

  /comments/post/{postId}:
    get:
      summary: "Obtener todos los comentarios activos de un post por su ID"
      tags:
        - Comments
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Comentarios no vencidos del post"

  # -------------------- TAGS --------------------
  /tags:
    get:
      summary: "Obtener todas las etiquetas (tags)"
      tags:
        - Tags
      responses:
        '200':
          description: "Lista de tags devuelta exitosamente"
    post:
      summary: "Crear una etiqueta (tag)"
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '201':
          description: "Tag creado"

  /tags/create:
    post:
      summary: "Crear una etiqueta (tag) (Alias)"
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '201':
          description: "Tag creado"

  /tags/{id}:
    get:
      summary: "Obtener etiqueta por ID"
      tags:
        - Tags
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Tag devuelto con posts asociados"
    put:
      summary: "Actualizar nombre de etiqueta"
      tags:
        - Tags
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '200':
          description: "Tag actualizado"
    delete:
      summary: "Eliminar una etiqueta por ID"
      tags:
        - Tags
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Tag eliminado"

  # -------------------- POST IMAGES --------------------
  /postImages:
    get:
      summary: "Obtener todas las imágenes de posts"
      tags:
        - Post Images
      responses:
        '200':
          description: "Lista de imágenes obtenida"
    post:
      summary: "Crear registro de imagen (Carga física mediante Multer)"
      description: "Permite subir una imagen utilizando multipart/form-data. El archivo debe enviarse en la propiedad 'url' y el ID del post en 'post'."
      tags:
        - Post Images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - url
                - post
              properties:
                url:
                  type: string
                  format: binary
                  description: "Archivo de imagen físico"
                post:
                  type: string
                  pattern: '^[0-9a-fA-F]{24}$'
                  description: "ID del post asociado"
      responses:
        '201':
          description: "Imagen subida e ingresada con éxito"

  /post_Images:
    get:
      summary: "Obtener todas las imágenes de posts (Alias)"
      tags:
        - Post Images
      responses:
        '200':
          description: "Lista de imágenes"
    post:
      summary: "Crear registro de imagen (Alias)"
      tags:
        - Post Images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - url
                - post
              properties:
                url:
                  type: string
                  format: binary
                post:
                  type: string
                  pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '201':
          description: "Imagen creada"

  /postImages/{id}:
    get:
      summary: "Obtener una imagen por ID"
      tags:
        - Post Images
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Imagen devuelta"
    put:
      summary: "Actualizar URL de imagen"
      tags:
        - Post Images
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
      responses:
        '200':
          description: "Registro actualizado"
    delete:
      summary: "Eliminar una imagen por ID"
      description: "Elimina el registro de la base de datos y borra el archivo del sistema de archivos local."
      tags:
        - Post Images
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Imagen eliminada exitosamente"

  /post_Images/{id}:
    get:
      summary: "Obtener una imagen por ID (Alias)"
      tags:
        - Post Images
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Imagen devuelta"
    delete:
      summary: "Eliminar una imagen por ID (Alias)"
      tags:
        - Post Images
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: "Imagen eliminada"

components:
  schemas:
    User:
      type: object
      required:
        - id
        - nickName
      properties:
        id:
          type: string
          example: "60c72b2f9b1d8b3c6c8e4f10"
        nickName:
          type: string
          example: "juanperez"
        followers:
          type: array
          items:
            type: string
        following:
          type: array
          items:
            type: string

    UserDetail:
      type: object
      required:
        - id
        - nickName
      properties:
        id:
          type: string
          example: "60c72b2f9b1d8b3c6c8e4f10"
        nickName:
          type: string
          example: "juanperez"
        followers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              nickName:
                type: string
        following:
          type: array
          items:
            type: string
        posts:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              description:
                type: string
              createdAt:
                type: string
        comentarios:
          type: array
          items:
            $ref: '#/components/schemas/Comment'

    CreateUserRequest:
      type: object
      required:
        - nickName
      properties:
        nickName:
          type: string
          minLength: 5
          maxLength: 30
          example: "juanperez"

    Post:
      type: object
      required:
        - id
        - description
        - user
      properties:
        id:
          type: string
          example: "60c72b2f9b1d8b3c6c8e4f11"
        description:
          type: string
          example: "Este es mi primer post en la red antisocial"
        user:
          type: object
          properties:
            id:
              type: string
            nickName:
              type: string
        tags:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        images:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'

    CreatePostRequest:
      type: object
      required:
        - description
        - user
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 500
          example: "Este es el contenido del post"
        user:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          example: "60c72b2f9b1d8b3c6c8e4f10"
        tags:
          type: array
          items:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'

    Comment:
      type: object
      required:
        - id
        - text
        - post
        - user
      properties:
        id:
          type: string
          example: "60c72b2f9b1d8b3c6c8e4f12"
        text:
          type: string
          example: "Este es un comentario de prueba"
        post:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            nickName:
              type: string
        createdAt:
          type: string

    CreateCommentRequest:
      type: object
      required:
        - text
        - post
        - user
      properties:
        text:
          type: string
          example: "Mi comentario sobre la publicación"
        post:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          example: "60c72b2f9b1d8b3c6c8e4f11"
        user:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          example: "60c72b2f9b1d8b3c6c8e4f10"

    CreateTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "tecnologia"